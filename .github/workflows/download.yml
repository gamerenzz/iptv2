name: Auto Download IPTV M3U to config

on:
  schedule:
    # 每天北京时间上午 8:00 和晚上 20:00 自动执行
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 支持手动点击触发

permissions:
  contents: write # 赋予 Action 往仓库推送文件的权限

jobs:
  download_job:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 创建文件夹并下载文件
      - name: Download M3U File to config
        run: |
          # 创建 config 文件夹（如果该文件夹已存在，-p 参数会确保不报错）
          mkdir -p config
          
          # 将文件下载并保存至 config 目录下
          curl -L -s -o config/abc123.m3u "https://iptv.renzz.cc.cd/abc123"

      # 3. 提交变动回仓库
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 仅添加 config 目录下的 m3u 文件
          git add config/abc123.m3u
          
          # 判断文件是否有更新
          if git diff --staged --quiet; then
            echo "文件无变化，跳过提交。"
          else
            git commit -m "自动更新 config/abc123.m3u"
            git push
          fi
