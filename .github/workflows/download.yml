name: Auto Download IPTV M3U

on:
  schedule:
    # 定时任务：每天北京时间上午 8:00 和晚上 20:00 自动执行
    # 注：GitHub Actions 使用的是 UTC 时间，0 0 代表 UTC 0点（即北京时间早上 8 点）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许您在 GitHub 页面上手动点击按钮立即触发运行

permissions:
  contents: write # 赋予 Action 往您仓库写入和提交代码的权限

jobs:
  download_job:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 模拟下载 M3U 文件
      - name: Download M3U File
        run: |
          # 使用 curl 下载文件并保存为 abc123.m3u
          # -L 参数用于自动跟踪重定向（防止该链接后续有跳转）
          curl -L -s -o abc123.m3u "https://iptv.renzz.cc.cd/abc123"

      # 3. 检查文件是否有更新，若有更新则提交回仓库
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 将下载的文件添加到暂存区
          git add abc123.m3u
          
          # 判断文件内容是否有变化，防止无变化的频繁提交产生报错
          if git diff --staged --quiet; then
            echo "文件无变化，跳过提交。"
          else
            git commit -m "自动更新 abc123.m3u"
            git push
          fi
